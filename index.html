  <!-- Simulated necessary cookies -->
  <script>
    // Session cookie (common pattern)
    document.cookie = "PHPSESSID=xyz123abc; path=/; Secure; SameSite=Strict";

    // CSRF token cookie
    document.cookie = "csrftoken=secureToken987; path=/; Secure; SameSite=Strict";
  </script>
  <script>
    // Apply theme from cookie when page loads
    window.onload = function() {
      const cookies = document.cookie.split(';').map(c => c.trim());
      const themeCookie = cookies.find(c => c.startsWith("userTheme="));
      if (themeCookie) {
        const theme = themeCookie.split("=")[1];
        document.body.className = theme;
      }
    };

    // Function to set theme preference
    function setTheme(theme) {
      document.cookie = "userTheme=" + theme + "; path=/; max-age=604800; Secure; SameSite=Lax";
      document.body.className = theme;
    }
  </script>
  <!-- Dummy marketing cookie -->
